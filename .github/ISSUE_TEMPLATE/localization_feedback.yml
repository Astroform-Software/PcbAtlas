name: Localization feedback
description: Report mistranslated, awkward, missing, or inconsistent app/docs text.
title: "Localization: "
labels: ["localization", "needs-triage"]
body:
  - type: dropdown
    id: locale
    attributes:
      label: Language or locale
      options:
        - Chinese Simplified
        - Chinese Traditional
        - Japanese
        - Korean
        - German
        - French
        - Spanish
        - Other
    validations:
      required: true
  - type: textarea
    id: current-text
    attributes:
      label: Current text
      description: Paste the exact app or documentation text.
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Where it appears
      description: App screen, dialog, menu, documentation URL, or screenshot context.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested text
      description: What should the text say instead?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why this is better
      description: Explain terminology, grammar, tone, regional usage, or PCB/manufacturing convention.
    validations:
      required: false
  - type: checkboxes
    id: public-safe
    attributes:
      label: Public sharing check
      options:
        - label: Any screenshot or example text I attach is safe to share publicly.
          required: true
