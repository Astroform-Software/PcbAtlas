name: Documentation issue
description: Report unclear, missing, or incorrect website/user-guide content.
title: "Docs: "
labels: ["documentation", "needs-triage"]
body:
  - type: input
    id: page
    attributes:
      label: Page URL
      placeholder: "https://www.astroformsoftware.com/docs/..."
    validations:
      required: false
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
      description: Describe the confusing text, missing step, outdated screenshot, or incorrect behavior.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested correction
      description: Optional wording or screenshot guidance.
    validations:
      required: false

